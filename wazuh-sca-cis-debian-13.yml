# ==============================================================================
# 13. SYSTEM MAINTENANCE (CIS 6.1)
# ==============================================================================
  - id: 60100
    title: "CIS 6.1.2 - Ensure permissions on /etc/passwd are configured"
    description: "/etc/passwd should have 644 permissions."
    remediation: "Run 'chmod 644 /etc/passwd'"
    condition: "any"
    rules:
      - type: "command"
        field: "command"
        value: "stat -c '%a' /etc/passwd 2>/dev/null"
        operator: "regex"
        result:
          type: "regex"
          value: "^644$"
    compliance:
      - cis: ["6.1.2"]
        level: "level_1"

  - id: 60101
    title: "CIS 6.1.3 - Ensure permissions on /etc/shadow are configured"
    description: "/etc/shadow should have 640 permissions."
    remediation: "Run 'chmod 640 /etc/shadow'"
    condition: "any"
    rules:
      - type: "command"
        field: "command"
        value: "stat -c '%a' /etc/shadow 2>/dev/null"
        operator: "regex"
        result:
          type: "regex"
          value: "^[0-6][0-4]0$"
    compliance:
      - cis: ["6.1.3"]
        level: "level_1"

  - id: 60102
    title: "CIS 6.1.4 - Ensure permissions on /etc/group are configured"
    description: "/etc/group should have 644 permissions."
    remediation: "Run 'chmod 644 /etc/group'"
    condition: "any"
    rules:
      - type: "command"
        field: "command"
        value: "stat -c '%a' /etc/group 2>/dev/null"
        operator: "regex"
        result:
          type: "regex"
          value: "^644$"
    compliance:
      - cis: ["6.1.4"]
        level: "level_1"

  - id: 60103
    title: "CIS 6.1.5 - Ensure permissions on /etc/gshadow are configured"
    description: "/etc/gshadow should have 640 permissions."
    remediation: "Run 'chmod 640 /etc/gshadow'"
    condition: "any"
    rules:
      - type: "command"
        field: "command"
        value: "stat -c '%a' /etc/gshadow 2>/dev/null"
        operator: "regex"
        result:
          type: "regex"
          value: "^[0-6][0-4]0$"
    compliance:
      - cis: ["6.1.5"]
        level: "level_1"

  - id: 60104
    title: "CIS 6.2.1 - Ensure no duplicate UIDs exist"
    description: "No duplicate user IDs should exist."
    remediation: "Edit /etc/passwd to ensure all UIDs are unique."
    condition: "any"
    rules:
      - type: "command"
        field: "command"
        value: "cut -f3 -d: /etc/passwd | sort | uniq -d 2>/dev/null"
        operator: "regex"
        result:
          type: "regex"
          value: "^$"
    compliance:
      - cis: ["6.2.1"]
        level: "level_1"

  - id: 60105
    title: "CIS 6.2.2 - Ensure no duplicate GIDs exist"
    description: "No duplicate group IDs should exist."
    remediation: "Edit /etc/group to ensure all GIDs are unique."
    condition: "any"
    rules:
      - type: "command"
        field: "command"
        value: "cut -f3 -d: /etc/group | sort | uniq -d 2>/dev/null"
        operator: "regex"
        result:
          type: "regex"
          value: "^$"
    compliance:
      - cis: ["6.2.2"]
        level: "level_1"

  - id: 60106
    title: "CIS 6.2.3 - Ensure no duplicate user names exist"
    description: "No duplicate user names should exist."
    remediation: "Edit /etc/passwd to ensure all usernames are unique."
    condition: "any"
    rules:
      - type: "command"
        field: "command"
        value: "cut -f1 -d: /etc/passwd | sort | uniq -d 2>/dev/null"
        operator: "regex"
        result:
          type: "regex"
          value: "^$"
    compliance:
      - cis: ["6.2.3"]
        level: "level_1"

  - id: 60107
    title: "CIS 6.2.4 - Ensure no duplicate group names exist"
    description: "No duplicate group names should exist."
    remediation: "Edit /etc/group to ensure all group names are unique."
    condition: "any"
    rules:
      - type: "command"
        field: "command"
        value: "cut -f1 -d: /etc/group | sort | uniq -d 2>/dev/null"
        operator: "regex"
        result:
          type: "regex"
          value: "^$"
    compliance:
      - cis: ["6.2.4"]
        level: "level_1"

  - id: 60108
    title: "CIS 6.2.5 - Ensure root PATH Integrity"
    description: "The root PATH should not contain empty entries or dot entries."
    remediation: "Edit /root/.profile to remove insecure PATH entries."
    condition: "any"
    rules:
      - type: "command"
        field: "command"
        value: "echo \"$PATH\" | grep -E '(^|:)(\\.|:)' 2>/dev/null"
        operator: "regex"
        result:
          type: "regex"
          value: "^$"
    compliance:
      - cis: ["6.2.5"]
        level: "level_1"

  - id: 60109
    title: "CIS 6.2.6 - Ensure root is the only UID 0 account"
    description: "Only root should have UID 0."
    remediation: "Remove or change UID of any account other than root with UID 0."
    condition: "any"
    rules:
      - type: "command"
        field: "command"
        value: "awk -F: '($3 == 0) {print $1}' /etc/passwd 2>/dev/null"
        operator: "regex"
        result:
          type: "regex"
          value: "^root$"
    compliance:
      - cis: ["6.2.6"]
        level: "level_1"

