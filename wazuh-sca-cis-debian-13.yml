  - id: 10601
    title: "CIS 1.6.2 - Ensure AppArmor is enabled in the bootloader (L2)"
    description: "AppArmor should be enabled via kernel parameters."
    remediation: "Add 'apparmor=1 security=apparmor' to GRUB_CMDLINE_LINUX."
    condition: "any"
    rules:
      - type: "command"
        field: "command"
        value: "grep -E 'apparmor=1' /proc/cmdline 2>/dev/null"
        operator: "regex"
